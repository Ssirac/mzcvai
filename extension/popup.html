<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 13px system-ui, sans-serif; width: 300px; margin: 0; padding: 14px; color: #111; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    label { display: block; margin: 10px 0 4px; font-weight: 600; }
    input, select, button { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 8px; font: inherit; }
    button { background: #059669; color: #fff; border: none; font-weight: 600; cursor: pointer; margin-top: 12px; }
    button.secondary { background: #eee; color: #111; margin-top: 6px; }
    #status { margin-top: 10px; font-size: 12px; color: #555; min-height: 16px; }
    .hint { color: #777; font-size: 11px; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>MZ Autofill</h1>
  <label for="base">MZ Basis-URL</label>
  <input id="base" type="url" placeholder="https://mzcvai-production.up.railway.app" />
  <div class="hint">In der MZ-App eingeloggt sein (Session-Cookie wird genutzt).</div>

  <label for="cand">Kandidat</label>
  <select id="cand"><option value="">— Kandidaten laden —</option></select>
  <button id="load" class="secondary" type="button">Kandidaten laden</button>

  <button id="save" type="button">Speichern</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
