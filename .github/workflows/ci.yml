name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm install (not `npm ci`): the lockfile is generated on Windows and
        # its platform-specific optional deps (e.g. @unrs/resolver wasm bindings
        # → @emnapi/*) differ from the Linux CI runner, which makes `npm ci`'s
        # strict sync check fail. `npm install` resolves for the CI platform and
        # tolerates that drift while still respecting the lockfile where it can.
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Lint
        # Next 16 removed `next lint` — ESLint runs directly (flat config).
        run: npx eslint .

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Build reads no secrets, but keep placeholders so nothing throws.
          NEXTAUTH_SECRET: ci-placeholder-secret
