name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Lint
        run: npx next lint

      - name: Build
        run: npm run build
        env:
          # Build reads no secrets, but keep placeholders so nothing throws.
          NEXTAUTH_SECRET: ci-placeholder-secret
